<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AV / CRM — Signal Flow</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#09090b" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AV/CRM" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{
    --bg-0:#09090b;
    --bg-1:#18181b;
    --bg-2:#27272a;
    --zinc-300:#d4d4d8;
    --zinc-400:#a1a1aa;
    --zinc-500:#71717a;
    --zinc-600:#52525b;
    --zinc-700:#3f3f46;
    --zinc-800:#27272a;
    --zinc-900:#18181b;
    --zinc-950:#09090b;
    --input-bg:#09090b;
    --text-strong:#fafafa;
    --cyan-400:#22d3ee;
    --cyan-900:#164e63;
    --accent-text:#22d3ee;
    --amber-400:#fbbf24;
    --emerald-400:#34d399;
    --red-400:#f87171;
    --blue-400:#60a5fa;
    --overlay:rgba(0,0,0,0.6);
    --btn-primary-hover:#67e8f9;
    --btn-secondary-hover:#e4e4e7;
  }
  html[data-theme="light"]{
    --bg-0:#eef0f3;
    --zinc-300:#1f2329;
    --zinc-400:#52525b;
    --zinc-500:#6b7280;
    --zinc-600:#9aa0a8;
    --zinc-700:#d1d5db;
    --zinc-800:#e5e7eb;
    --zinc-900:#ffffff;
    --input-bg:#f1f2f4;
    --text-strong:#16181d;
    --cyan-900:#a5f3fc;
    --accent-text:#0e7490;
    --overlay:rgba(15,23,30,0.45);
    --btn-primary-hover:#0891b2;
    --btn-secondary-hover:#16181d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg-0); color:var(--text-strong);
    height:100vh; overflow:hidden;
    transition:background-color .2s ease, color .2s ease;
  }
  body, body *{
    transition:background-color .15s ease, border-color .15s ease, color .15s ease;
  }
  button, input, select, textarea{font-family:inherit;}

  .app{display:flex; height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{display:none; flex-direction:column; width:224px; background:var(--bg-0); border-right:1px solid var(--zinc-800); flex-shrink:0;}
  @media (min-width:768px){ .sidebar{display:flex;} }
  .sidebar-header{padding:20px; border-bottom:1px solid var(--zinc-800);}
  .sidebar-header-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .brand-sub{font-family:ui-monospace,monospace; font-size:11px; color:var(--zinc-500); letter-spacing:0.18em; margin-bottom:4px;}
  .brand{font-size:18px; font-weight:700; letter-spacing:-0.02em; color:var(--text-strong);}
  .brand .accent{color:var(--accent-text);}

  .theme-toggle{position:relative; width:40px; height:22px; border-radius:11px; border:1px solid var(--zinc-700);
    background:var(--zinc-950); cursor:pointer; padding:0; flex-shrink:0; transition:background-color .2s ease, border-color .2s ease;}
  .theme-toggle::before{
    content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%;
    background:var(--cyan-400); transition:transform .2s ease, background-color .2s ease;
    box-shadow:inset -2px -2px 0 rgba(0,0,0,0.25);
  }
  html[data-theme="light"] .theme-toggle{background:var(--zinc-800); border-color:var(--zinc-700);}
  html[data-theme="light"] .theme-toggle::before{
    transform:translateX(18px); background:var(--amber-400);
    box-shadow:inset 2px 2px 0 rgba(255,255,255,0.35);
  }
  .theme-toggle-mobile{align-self:center; flex:0 0 auto; width:48px;}
  .nav{flex:1; padding:8px 0;}
  .nav-item{display:flex; align-items:center; gap:12px; padding:12px 16px; width:100%; text-align:left;
    border:none; border-left:2px solid transparent; background:none; color:var(--zinc-500); cursor:pointer;
    font-size:14px; font-weight:500;}
  .nav-item:hover{color:var(--zinc-300); background:var(--zinc-900);}
  .nav-item.active{border-left-color:var(--cyan-400); background:var(--zinc-900); color:var(--text-strong);}
  .nav-num{font-family:ui-monospace,monospace; font-size:12px; color:var(--zinc-600);}
  .nav-led{margin-left:auto;}
  .sidebar-footer{padding:14px 16px; border-top:1px solid var(--zinc-800); font-family:ui-monospace,monospace; font-size:11px; color:var(--zinc-600); display:flex; flex-direction:column; gap:10px;}
  .data-actions{display:flex; flex-direction:column; gap:6px;}
  .data-btn{background:none; border:1px solid var(--zinc-700); color:var(--zinc-400); font-size:11px;
    font-family:ui-monospace,monospace; text-transform:uppercase; letter-spacing:0.08em; padding:6px 10px;
    border-radius:4px; cursor:pointer; text-align:center;}
  .data-btn:hover{border-color:var(--cyan-400); color:var(--accent-text);}

  /* ---------- main ---------- */
  .main{flex:1; overflow-y:auto; padding-bottom:120px;}
  @media (min-width:768px){ .main{padding-bottom:0;} }
  .view-container{padding:16px; max-width:1152px; margin:0 auto;}
  @media (min-width:768px){ .view-container{padding:32px;} }

  /* ---------- mobile bottom bar ---------- */
  .mobile-bottom{display:none; flex-direction:column; position:fixed; bottom:0; left:0; right:0; z-index:40; background:var(--bg-0);}
  @media (min-width:768px){ .mobile-bottom{display:none !important;} }
  @media (max-width:767px){ .mobile-bottom{display:flex;} }
  .mobile-data-bar{display:flex; gap:8px; padding:8px 16px; border-top:1px solid var(--zinc-800); background:var(--bg-0);}
  .mobile-data-bar .data-btn{flex:1;}
  .mobile-nav{display:flex; background:var(--bg-0);
    border-top:1px solid var(--zinc-800); padding:8px 4px;
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .mobile-nav::-webkit-scrollbar{display:none;}
  .mnav-item{display:flex; flex-direction:column; align-items:center; gap:4px; padding:4px 14px;
    background:none; border:none; color:var(--zinc-500); cursor:pointer; font-size:11px;
    flex-shrink:0; min-width:60px; scroll-snap-align:start;}
  .mnav-item.active{color:var(--accent-text);}

  /* ---------- PWA install banner ---------- */
  #pwa-banner{
    display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--zinc-800); border:1px solid var(--cyan-400); border-radius:12px;
    padding:14px 18px; z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,0.5);
    max-width:340px; width:calc(100% - 32px);
    flex-direction:column; gap:10px;
  }
  #pwa-banner.show{display:flex;}
  .pwa-banner-row{display:flex; align-items:center; gap:12px;}
  .pwa-banner-icon{width:40px; height:40px; border-radius:10px; background:var(--cyan-400); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px;}
  .pwa-banner-text{flex:1;}
  .pwa-banner-title{font-size:14px; font-weight:600; color:var(--text-strong);}
  .pwa-banner-sub{font-size:12px; color:var(--zinc-400); margin-top:2px;}
  .pwa-banner-btns{display:flex; gap:8px;}
  .pwa-install-btn{flex:1; background:var(--cyan-400); color:#09090b; border:none; border-radius:8px; padding:10px; font-size:13px; font-weight:700; cursor:pointer;}
  .pwa-dismiss-btn{background:none; border:1px solid var(--zinc-700); color:var(--zinc-400); border-radius:8px; padding:10px 14px; font-size:13px; cursor:pointer;}

  .led{display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .led-zinc{background:var(--zinc-500);}
  .led-amber{background:var(--amber-400);}
  .led-cyan{background:var(--cyan-400);}
  .led-blue{background:var(--blue-400);}
  .led-emerald{background:var(--emerald-400);}
  .led-red{background:var(--red-400);}

  .text-zinc{color:var(--zinc-500);}
  .text-amber{color:var(--amber-400);}
  .text-cyan{color:var(--accent-text);}
  .text-blue{color:var(--blue-400);}
  .text-emerald{color:var(--emerald-400);}
  .text-red{color:var(--red-400);}

  .view-header{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px;}
  .view-title{font-size:20px; font-weight:700; letter-spacing:-0.02em; color:var(--text-strong);}
  .view-subtitle{font-size:14px; color:var(--zinc-500); margin-top:4px;}
  .muted-italic{font-size:14px; color:var(--zinc-600); font-style:italic;}

  .btn-primary{display:inline-flex; align-items:center; gap:8px; background:var(--cyan-400); color:var(--zinc-950);
    font-weight:600; font-size:14px; padding:8px 16px; border-radius:6px; border:none; cursor:pointer;}
  .btn-primary:hover{background:var(--btn-primary-hover);}
  .btn-secondary{background:none; border:none; color:var(--zinc-400); font-size:14px; padding:8px 16px; cursor:pointer;}
  .btn-secondary:hover{color:var(--btn-secondary-hover);}

  .icon-btn{background:none; border:none; color:var(--zinc-500); cursor:pointer; display:flex; padding:0;}
  .icon-btn:hover{color:var(--accent-text);}
  .icon-btn.danger:hover{color:var(--red-400);}
  .delete-confirm{display:flex; align-items:center; gap:8px;}
  .confirm-btn{background:none; border:none; font-size:12px; color:var(--red-400); font-weight:500; cursor:pointer; padding:0;}
  .cancel-btn{background:none; border:none; font-size:12px; color:var(--zinc-500); cursor:pointer; padding:0;}

  /* ---------- dashboard ---------- */
  .stats-grid{display:grid; grid-template-columns:1fr; gap:16px; margin-bottom:32px;}
  @media (min-width:640px){ .stats-grid{grid-template-columns:1fr 1fr;} }
  @media (min-width:1024px){ .stats-grid{grid-template-columns:1fr 1fr 1fr 1fr;} }
  .stat-card{background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:12px;}
  .stat-top{display:flex; align-items:center; justify-content:space-between;}
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--zinc-500); font-family:ui-monospace,monospace;}
  .stat-value{font-size:24px; font-weight:700; color:var(--text-strong); font-family:ui-monospace,monospace;}
  .eq-bars{display:flex; align-items:flex-end; gap:3px; height:32px;}
  .eq-bar{flex:1; border-radius:2px; background:var(--zinc-800);}
  .eq-amber{background:var(--amber-400) !important;}
  .eq-cyan{background:var(--cyan-400) !important;}
  .eq-emerald{background:var(--emerald-400) !important;}
  .eq-red{background:var(--red-400) !important;}

  .dash-cols{display:grid; grid-template-columns:1fr; gap:24px;}
  @media (min-width:1024px){ .dash-cols{grid-template-columns:1fr 1fr;} }
  .col-title{font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--zinc-500); font-family:ui-monospace,monospace; margin-bottom:12px;}
  .list-col{display:flex; flex-direction:column; gap:8px;}

  .job-row{display:flex; align-items:center; gap:12px; background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:8px; padding:12px 16px;}
  .job-row-info{flex:1; min-width:0;}
  .job-row-title{font-size:14px; font-weight:500; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .job-row-sub{font-size:12px; color:var(--zinc-500);}
  .job-row-meta{text-align:right; flex-shrink:0;}
  .job-row-date{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-400);}
  .job-row-value{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-500);}

  .comm-row{display:flex; align-items:flex-start; gap:12px; background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:8px; padding:12px 16px;}
  .comm-icon{color:var(--zinc-500); margin-top:2px; display:flex;}
  .comm-body{flex:1; min-width:0;}
  .comm-top{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;}
  .comm-client{font-size:14px; font-weight:500; color:var(--text-strong);}
  .comm-date{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-500);}
  .comm-job{font-size:12px; color:var(--accent-text); margin-top:2px;}
  .comm-note{font-size:14px; color:var(--zinc-400); margin-top:4px; line-height:1.5;}

  /* ---------- clients ---------- */
  .search-box{position:relative; max-width:320px; margin-bottom:16px;}
  .search-icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--zinc-500); display:flex;}
  .search-input{width:100%; background:var(--zinc-900); border:1px solid var(--zinc-700); border-radius:6px;
    padding:8px 12px 8px 36px; font-size:14px; color:var(--text-strong);}
  .search-input:focus{outline:none; border-color:var(--cyan-400);}

  .client-grid{display:grid; grid-template-columns:1fr; gap:16px;}
  @media (min-width:640px){ .client-grid{grid-template-columns:1fr 1fr;} }
  @media (min-width:1024px){ .client-grid{grid-template-columns:1fr 1fr 1fr;} }
  .client-card{background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:8px;}
  .client-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .client-name{font-weight:600; color:var(--text-strong); font-size:15px;}
  .client-company{font-size:12px; color:var(--zinc-500);}
  .client-actions{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .badge-type{display:inline-block; font-size:12px; font-family:ui-monospace,monospace; color:var(--accent-text);
    border:1px solid var(--cyan-900); border-radius:4px; padding:2px 8px; align-self:flex-start;}
  .contact-list{display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--zinc-400); margin-top:4px;}
  .contact-row{display:flex; align-items:center; gap:8px;}
  .contact-link{display:flex; align-items:center; gap:8px; color:var(--zinc-400); text-decoration:none;}
  .contact-link:hover{color:var(--accent-text);}
  .lead-badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    font-family:ui-monospace,monospace; color:var(--amber-400); border:1px solid var(--amber-400); border-radius:999px; padding:2px 8px;}
  .field-checkbox{display:flex; align-items:center; gap:8px; flex-direction:row; cursor:pointer;}
  .field-checkbox-input{width:auto; flex-shrink:0;}
  .field-checkbox span{font-size:13px; color:var(--text-strong); text-transform:none; letter-spacing:normal; font-family:inherit;}
  .tag-list{display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;}
  .tag{font-size:12px; background:var(--zinc-800); color:var(--zinc-400); border-radius:4px; padding:2px 8px;}
  .client-notes{font-size:12px; color:var(--zinc-500); margin-top:4px; line-height:1.5;}
  .client-footer{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-600); margin-top:4px;}

  /* ---------- jobs / kanban ---------- */
  .kanban{display:grid; grid-template-columns:1fr; gap:16px;}
  @media (min-width:768px){ .kanban{grid-template-columns:repeat(5,1fr);} }
  .kanban-col{display:flex; flex-direction:column; gap:12px;}
  .kanban-head{display:flex; align-items:center; justify-content:space-between; padding:0 4px;}
  .kanban-status{display:flex; align-items:center; gap:8px;}
  .kanban-status-label{font-size:12px; text-transform:uppercase; letter-spacing:0.06em; font-family:ui-monospace,monospace; color:var(--zinc-400);}
  .kanban-count{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-600);}
  .kanban-value{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-500); padding:0 4px;}
  .kanban-cards{display:flex; flex-direction:column; gap:8px; min-height:60px;}

  .job-card{background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:8px; padding:12px; display:flex; flex-direction:column; gap:8px;}
  .job-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .job-card-title{font-size:14px; font-weight:600; color:var(--text-strong); line-height:1.3;}
  .job-card-client{font-size:12px; color:var(--zinc-500);}
  .job-card-meta{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-400);}
  .job-card-value{font-size:14px; font-family:ui-monospace,monospace; font-weight:700; color:var(--text-strong);}
  .job-card-footer{display:flex; align-items:center; justify-content:space-between; margin-top:4px;}
  .job-card-actions{display:flex; align-items:center; gap:8px;}
  .status-select{background:var(--input-bg); border:1px solid var(--zinc-700); border-radius:4px; font-size:12px; padding:4px 6px; color:var(--zinc-300);}
  .status-select:focus{outline:none; border-color:var(--cyan-400);}

  /* ---------- inventory (products / services) ---------- */
  .equip-actions{display:flex; align-items:center; gap:12px; flex-shrink:0;}
  .equip-status{font-size:12px; font-family:ui-monospace,monospace; text-transform:uppercase; letter-spacing:0.06em;}

  .inv-stats{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}
  .inv-stat-chip{display:flex; align-items:center; gap:8px; background:var(--zinc-900); border:1px solid var(--zinc-800);
    border-radius:8px; padding:8px 14px; cursor:pointer; color:var(--zinc-400); font-size:12px;}
  .inv-stat-chip:hover{border-color:var(--zinc-700);}
  .inv-stat-chip.active{border-color:var(--cyan-400); color:var(--text-strong);}
  .inv-stat-num{font-family:ui-monospace,monospace; font-size:15px; font-weight:700; color:var(--text-strong);}
  .inv-stat-label{text-transform:uppercase; letter-spacing:0.08em; font-size:11px;}

  .inv-filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;}
  .inv-pill{display:inline-flex; align-items:center; gap:6px; background:none; border:1px solid var(--zinc-800);
    border-radius:999px; padding:6px 14px; font-size:12px; color:var(--zinc-400); cursor:pointer; white-space:nowrap;}
  .inv-pill:hover{border-color:var(--zinc-700); color:var(--text-strong);}
  .inv-pill.active{background:var(--cyan-400); border-color:var(--cyan-400); color:var(--zinc-950); font-weight:600;}

  .inv-grid{display:grid; grid-template-columns:1fr; gap:14px;}
  @media (min-width:640px){ .inv-grid{grid-template-columns:1fr 1fr;} }
  @media (min-width:1024px){ .inv-grid{grid-template-columns:1fr 1fr 1fr;} }
  .inv-card{background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:10px; padding:16px;
    display:flex; flex-direction:column; gap:8px;}
  .inv-card-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .inv-cat-badge{display:inline-flex; align-items:center; gap:6px; font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    font-family:ui-monospace,monospace; color:var(--zinc-500);}
  .inv-card-name{font-size:14px; font-weight:600; color:var(--text-strong); line-height:1.3;}
  .inv-card-ref{font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-500);}
  .inv-card-notes{font-size:12px; color:var(--zinc-400); line-height:1.5;}
  .inv-card-footer{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:auto; padding-top:8px; border-top:1px solid var(--zinc-800);}
  .inv-empty{display:flex; flex-direction:column; align-items:flex-start; gap:12px;}

  /* ---------- calendar ---------- */
  .cal-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:8px;}
  .cal-month-group{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;}
  .cal-month{font-family:ui-monospace,monospace; font-size:14px; text-transform:uppercase; letter-spacing:0.12em; color:var(--zinc-300);}
  .cal-today-btn{background:none; border:1px solid var(--zinc-700); color:var(--zinc-400); font-size:11px;
    font-family:ui-monospace,monospace; text-transform:uppercase; letter-spacing:0.08em; padding:3px 10px;
    border-radius:4px; cursor:pointer;}
  .cal-today-btn:hover{border-color:var(--cyan-400); color:var(--accent-text);}
  .cal-nav-btn{background:none; border:none; color:var(--zinc-400); cursor:pointer; padding:4px; display:flex;}
  .cal-nav-btn:hover{color:var(--accent-text);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-dow{text-align:center; font-size:12px; font-family:ui-monospace,monospace; color:var(--zinc-500); padding:4px 0;}
  .cal-cell{background:var(--zinc-900); border:1px solid var(--zinc-800); border-radius:6px; min-height:70px; padding:4px; display:flex; flex-direction:column; gap:2px;}
  .cal-cell.empty{background:var(--input-bg); border:none;}
  .cal-cell.today{border-color:var(--cyan-400);}

  if(!d) return '\u2014';
  const dt = new Date(d + 'T00:00:00');
  if(isNaN(dt.getTime())) return '\u2014';
  return dt.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
}
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function esc(str){
  return String(str === undefined || str === null ? '' : str).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];

function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  const label = state.theme === 'light' ? 'Switch to night mode' : 'Switch to day mode';
  const toggle = document.getElementById('theme-toggle');
  const toggleMobile = document.getElementById('theme-toggle-mobile');
  if(toggle) toggle.setAttribute('title', label);
  if(toggleMobile) toggleMobile.setAttribute('title', label);
}

function loadData(){
  state.clients   = JSON.parse(JSON.stringify(SEED_CLIENTS));
  state.contacts  = JSON.parse(JSON.stringify(SEED_CONTACTS));
  state.jobs      = JSON.parse(JSON.stringify(SEED_JOBS));
  state.products  = JSON.parse(JSON.stringify(SEED_PRODUCTS));
  state.services  = JSON.parse(JSON.stringify(SEED_SERVICES));
  state.comms     = JSON.parse(JSON.stringify(SEED_COMMS));
}

function exportData(){
  const payload = {
    clients: state.clients,
    contacts: state.contacts,
    jobs: state.jobs,
    products: state.products,
    services: state.services,
    comms: state.comms,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'av-crm-data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const data = JSON.parse(reader.result);
      if(data.clients) state.clients = data.clients;
      if(data.contacts) state.contacts = data.contacts;
      if(data.jobs) state.jobs = data.jobs;
      if(data.products) state.products = data.products;
      else if(data.equipment) state.products = data.equipment; // legacy export compatibility
      if(data.services) state.services = data.services;
      if(data.comms) state.comms = data.comms;
      state.modal = null;
      state.confirmDelete = null;
      render();
    }catch(e){
      window.alert('Could not read that file. Make sure it is a JSON file exported from AV/CRM.');
    }
  };
  reader.readAsText(file);
}

function eqBarsHtml(pct, colorClass){
  const clamped = Math.min(100, Math.max(0, pct || 0));
  const activeCount = Math.round((clamped / 100) * EQ_HEIGHTS.length);
  return '<div class="eq-bars">' + EQ_HEIGHTS.map(function(h, i){
    return '<div class="eq-bar ' + (i < activeCount ? colorClass : '') + '" style="height:' + h + '%"></div>';
  }).join('') + '</div>';
}

function statCard(iconName, label, value, pct, colorClass){
  const iconHtml = iconName === 'rupee' ? rupeeIcon() : icon(iconName, 14);
  return '<div class="stat-card">' +
    '<div class="stat-top"><span class="stat-label">' + esc(label) + '</span><span class="text-zinc">' + iconHtml + '</span></div>' +
    '<div class="stat-value">' + esc(value) + '</div>' +

function renderDashboard(){
  const totalJobsValue = state.jobs.reduce(function(s,j){ return s + Number(j.value || 0); }, 0) || 1;
  const pipelineValue = state.jobs.filter(function(j){ return j.status !== 'Paid'; }).reduce(function(s,j){ return s + Number(j.value || 0); }, 0);
  const bookedValue = state.jobs.filter(function(j){ return j.status === 'Booked'; }).reduce(function(s,j){ return s + Number(j.value || 0); }, 0);
  const outstandingValue = state.jobs.filter(function(j){ return j.status === 'Completed'; }).reduce(function(s,j){ return s + Number(j.value || 0); }, 0);
  const productBookedPct = state.products.length ? Math.round(state.products.filter(function(e){ return e.status === 'Booked'; }).length / state.products.length * 100) : 0;

  const upcoming = state.jobs.filter(function(j){ return j.status !== 'Paid'; })
    .slice().sort(function(a,b){ return (a.eventDate||'').localeCompare(b.eventDate||''); }).slice(0,5);
  const recent = state.comms.slice().sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); }).slice(0,5);

  return '' +
  '<div class="view-header"><div><h2 class="view-title">Dashboard</h2><p class="view-subtitle">Signal overview of your AV business</p></div></div>' +
  '<div class="stats-grid">' +
    statCard('activity', 'Pipeline Value', fmtINR(pipelineValue), pipelineValue/totalJobsValue*100, 'eq-amber') +
    statCard('briefcase', 'Booked Revenue', fmtINR(bookedValue), bookedValue/totalJobsValue*100, 'eq-cyan') +
    statCard('rupee', 'Awaiting Invoice', fmtINR(outstandingValue), outstandingValue/totalJobsValue*100, 'eq-red') +
    statCard('package', 'Products In Use', productBookedPct + '%', productBookedPct, 'eq-emerald') +
  '</div>' +
  '<div class="dash-cols">' +
    '<div>' +
      '<div class="col-title">Upcoming Jobs</div>' +
      '<div class="list-col">' + (upcoming.length === 0
        ? '<p class="muted-italic">Nothing scheduled. Add a job to fill the calendar.</p>'

    '<div>' +
      '<div class="col-title">Recent Activity</div>' +

}

function renderCalendar(){
  const y = state.calMonth.y, m = state.calMonth.m;
  const first = new Date(y, m, 1);
  const startDay = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for(let i = 0; i < startDay; i++) cells.push(null);
  for(let d = 1; d <= daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  const now = new Date();
  const isCurrentMonth = (y === now.getFullYear() && m === now.getMonth());
  const MAX_CHIPS = 3;

  const cellsHtml = cells.map(function(d){
    if(d === null) return '<div class="cal-cell empty"></div>';
    const dateStr = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayJobs = state.jobs.filter(function(j){ return j.eventDate === dateStr; });
    const isToday = dateStr === todayStr();
    const shown = dayJobs.slice(0, MAX_CHIPS);
    const extra = dayJobs.length - shown.length;
    const chipsHtml = shown.map(function(j){
      return '<button class="cal-job-chip ' + STATUS_TEXT[j.status] + '" data-action="open-modal" data-type="job" data-id="' + j.id + '" title="' + esc(j.title) + '">' + esc(j.title) + '</button>';
    }).join('') + (extra > 0 ? '<div class="cal-more">+' + extra + ' more</div>' : '');
    return '<div class="cal-cell ' + (isToday ? 'today' : '') + '">' +
      '<span class="cal-date">' + d + '</span>' +
      chipsHtml +
    '</div>';
  }).join('');

  return '' +
  '<div class="view-header"><div><h2 class="view-title">Calendar</h2><p class="view-subtitle">Job dates at a glance</p></div></div>' +
  '<div class="cal-header">' +
    '<button class="cal-nav-btn" data-action="cal-prev">' + icon('chevronleft',20) + '</button>' +
    '<div class="cal-month-group">' +
      '<span class="cal-month">' + MONTH_NAMES[m] + ' ' + y + '</span>' +
      (isCurrentMonth ? '' : '<button class="cal-today-btn" data-action="cal-today">Today</button>') +
    '</div>' +
    '<button class="cal-nav-btn" data-action="cal-next">' + icon('chevronright',20) + '</button>' +
  '</div>' +
  '<div class="cal-grid">' +
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(function(d){ return '<div class="cal-dow">' + d + '</div>'; }).join('') +
    cellsHtml +
  '</div>';
}

function fieldInput(label, field, value, type, extra){
  return '<label class="field"><span class="field-label">' + esc(label) + '</span>' +
    '<input class="field-input" type="' + (type || 'text') + '" data-field="' + field + '" value="' + esc(value === undefined ? '' : value) + '" ' + (extra || '') + '/></label>';
}
function fieldTextarea(label, field, value, rows){
  return '<label class="field"><span class="field-label">' + esc(label) + '</span>' +
    '<textarea class="field-textarea" data-field="' + field + '" rows="' + (rows || 3) + '">' + esc(value || '') + '</textarea></label>';
}
function fieldSelect(label, field, options, value){
  const opts = options.map(function(o){
    const val = (typeof o === 'object') ? o.value : o;
    const text = (typeof o === 'object') ? o.label : o;
    return '<option value="' + esc(val) + '" ' + (val === value ? 'selected' : '') + '>' + esc(text) + '</option>';
  }).join('');
  return '<label class="field"><span class="field-label">' + esc(label) + '</span>' +
    '<select class="field-select" data-field="' + field + '">' + opts + '</select></label>';
}
function fieldCheckbox(label, field, checked){

    '<input class="field-checkbox-input" type="checkbox" data-field="' + field + '" ' + (checked ? 'checked' : '') + '/>' +
    '<span>' + esc(label) + '</span></label>';

/* ================================ event handling ================================ */

function onBodyClick(e){
  if(e.target.classList && e.target.classList.contains('modal-overlay')){
    state.modal = null; render(); return;
  }
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  switch(action){
    case 'set-view':
      state.view = el.dataset.view;
      state.confirmDelete = null;
      render();
      break;
    case 'open-modal': {
      const type = el.dataset.type;
      const id = el.dataset.id;
      let data = null;
      if(id){
        if(type === 'client') data = state.clients.find(function(c){ return c.id === id; });
        if(type === 'contact') data = state.contacts.find(function(c){ return c.id === id; });
        if(type === 'job') data = state.jobs.find(function(j){ return j.id === id; });
        if(type === 'product' || type === 'service') data = state[INVENTORY_META[type].stateKey].find(function(x){ return x.id === id; });
        if(type === 'comm') data = state.comms.find(function(m){ return m.id === id; });
      }
      state.modal = { type: type, data: data || null };
      state.formDraft = buildDraft(type, data || null);
      render();
      break;
    }
    case 'close-modal':
      state.modal = null;
      render();
      break;
    case 'cal-prev':
      if(state.calMonth.m === 0) state.calMonth = { y: state.calMonth.y - 1, m: 11 };
      else state.calMonth.m -= 1;
      render();
      break;
    case 'cal-next':
      if(state.calMonth.m === 11) state.calMonth = { y: state.calMonth.y + 1, m: 0 };
      else state.calMonth.m += 1;
      render();
      break;
    case 'cal-today':
      state.calMonth = (function(){ const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; })();
      render();
      break;
    case 'delete-request':
      state.confirmDelete = { type: el.dataset.type, id: el.dataset.id };
      render();
      break;
    case 'delete-cancel':
      state.confirmDelete = null;
      render();
      break;
    case 'delete-confirm': {
      const t = el.dataset.type, id = el.dataset.id;
      if(t === 'client') deleteClient(id);
      else if(t === 'contact') deleteContact(id);
      else if(t === 'job') deleteJob(id);
      else if(t === 'product' || t === 'service') deleteInvItem(t, id);
      break;
    }
    case 'export-data':
      exportData();
      break;
    case 'import-data':
      document.getElementById('import-file-input').click();
      break;
    case 'toggle-theme':
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      applyTheme();
      break;
    case 'open-cinema':
      state.cinemaJobId = el.dataset.id || null;
      state.view = 'cinema';
      render();
      break;
    case 'open-audioplan':
      state.audioJobId = el.dataset.id || null;
      state.proAudioTab = 'coverage';
      state.view = 'audioplan';
      render();
      break;
    case 'proaudio-tab':
      state.proAudioTab = el.dataset.tab;
      // toggle panels and tabs in-place without full re-render (avoids iframe reload)
      document.querySelectorAll('.proaudio-tab').forEach(function(t){
        t.classList.toggle('active', t.dataset.tab === el.dataset.tab);
      });
      document.querySelectorAll('.proaudio-panel').forEach(function(p){
        p.classList.toggle('active', p.id === 'proaudio-panel-' + el.dataset.tab);
      });
      break;
    case 'inv-filter-category':
      state.invFilter[el.dataset.kind].category = el.dataset.value;
      render();
      break;
    case 'inv-filter-status':
      state.invFilter[el.dataset.kind].status = el.dataset.value;
      render();
      break;
    case 'inv-clear-filters':
      state.invFilter[el.dataset.kind] = { category:'all', status:'all', search:'' };
      render();
      break;
    case 'contact-filter-category':
      state.contactFilter.category = el.dataset.value;
      render();
      break;
    case 'contact-filter-lead':
      state.contactFilter.leadOnly = el.dataset.value === '1';
      render();
      break;
    case 'contact-clear-filters':
      state.contactFilter = { category:'all', search:'', leadOnly:false };
      render();
      break;
  }
}

function onBodyChange(e){
  const t = e.target;
  if(t.id === 'import-file-input'){
    if(t.files && t.files[0]) importDataFromFile(t.files[0]);
    t.value = '';
    return;
  }
  if(t.classList && t.classList.contains('job-status-select')){
    const job = state.jobs.find(function(j){ return j.id === t.dataset.id; });
    if(job){ job.status = t.value; render(); }
    return;
  }
  if(t.id === 'comm-filter-select'){
    state.commFilter = t.value;
    renderCommsListOnly();
    return;
  }
  const field = t.dataset.field;
  if(field && state.modal){
    state.formDraft[field] = (t.type === 'checkbox') ? t.checked : t.value;
    if(state.modal.type === 'comm' && field === 'clientId'){
      state.formDraft.jobId = '';
      const jobSelect = document.getElementById('field-jobId');
      if(jobSelect){
        const clientJobs = state.jobs.filter(function(j){ return j.clientId === t.value; });
        jobSelect.innerHTML = '<option value="">None</option>' + clientJobs.map(function(j){
          return '<option value="' + j.id + '">' + esc(j.title) + '</option>';
        }).join('');
      }
    }
  }
}

function onBodyInput(e){
  const t = e.target;
  if(t.id === 'client-search'){
    state.clientSearch = t.value;
    renderClientsListOnly();
    return;
  }
  if(t.id === 'inv-search-product'){
    state.invFilter.product.search = t.value;
    renderInvGridOnly('product');
    return;
  }
  if(t.id === 'inv-search-service'){
    state.invFilter.service.search = t.value;
    renderInvGridOnly('service');
    return;
  }
  if(t.id === 'contact-search'){
    state.contactFilter.search = t.value;
    renderContactGridOnly();
    return;
  }
  const field = t.dataset.field;
  if(field && state.modal){
    state.formDraft[field] = (t.type === 'checkbox') ? t.checked : t.value;
  }
}

function onBodySubmit(e){
  if(e.target.id !== 'entity-form') return;
  e.preventDefault();
  if(!state.modal) return;
  const type = state.modal.type;
  const draft = Object.assign({}, state.formDraft);
  if(type === 'client'){
    draft.tags = (draft.tags || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    saveClient(draft);
  } else if(type === 'job'){
    draft.value = Number(draft.value) || 0;
    saveJob(draft);
  } else if(type === 'product' || type === 'service'){
    saveInvItem(type, draft);
  } else if(type === 'contact'){
    saveContact(draft);
  } else if(type === 'comm'){
    saveComm(draft);
  }
}

/* ================================ nav + render ================================ */

function buildNav(){
  document.getElementById('sidebar-nav').innerHTML = NAV.map(function(item){
    return '<button class="nav-item" data-action="set-view" data-view="' + item.id + '">' +
      '<span class="nav-num">' + item.num + '</span>' + icon(item.icon,16) + '<span>' + item.label + '</span>' +
      '<span class="led led-cyan nav-led" style="visibility:hidden"></span>' +
    '</button>';
  }).join('');
  document.getElementById('mobile-nav').innerHTML = NAV.map(function(item){
    return '<button class="mnav-item" data-action="set-view" data-view="' + item.id + '">' + icon(item.icon,18) + '<span>' + item.label + '</span></button>';
  }).join('');
}

function updateNavActive(){
  const navItems = document.querySelectorAll('#sidebar-nav .nav-item');
  navItems.forEach(function(el, i){
    const active = NAV[i].id === state.view;
    el.classList.toggle('active', active);
    const led = el.querySelector('.nav-led');
    if(led) led.style.visibility = active ? 'visible' : 'hidden';
  });
  const mnavItems = document.querySelectorAll('#mobile-nav .mnav-item');
  mnavItems.forEach(function(el, i){
    const active = NAV[i].id === state.view;
    el.classList.toggle('active', active);
    if(active) el.scrollIntoView({ block:'nearest', inline:'nearest' });
  });
}

function updateSidebarFooter(){
  document.getElementById('sidebar-stats').textContent =
    state.clients.length + ' clients \u00B7 ' + state.contacts.length + ' contacts \u00B7 ' + state.jobs.length + ' jobs \u00B7 ' + state.products.length + ' products \u00B7 ' + state.services.length + ' services';
}

function render(){
  document.getElementById('view').innerHTML = VIEW_RENDERERS[state.view]();
  updateNavActive();
  updateSidebarFooter();
  renderModal();
}

/* ================================ init ================================ */

function init(){
  loadData();
  try{
    if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){
      state.theme = 'light';
    }
  }catch(e){}
  applyTheme();
  buildNav();
  document.body.addEventListener('click', onBodyClick);
  document.body.addEventListener('change', onBodyChange);
  document.body.addEventListener('input', onBodyInput);
  document.body.addEventListener('submit', onBodySubmit);
  window.addEventListener('message', function(e){
    const msg = e.data;
    if(!msg) return;
    if(msg.type === 'cinemaplan:ready'){
      if(state.cinemaJobId && e.source){
        e.source.postMessage({ type:'cinemaplan:prefill', data: buildCinemaPrefill(state.cinemaJobId) }, '*');
      }
      return;
    }
    if(msg.type === 'audioplan:ready'){
      if(state.audioJobId && e.source){
        e.source.postMessage({ type:'audioplan:prefill', data: buildAudioPlanPrefill(state.audioJobId) }, '*');
      }
      return;
    }
  });
  render();
}

init();
</script>

<!-- PWA Install Banner -->
<div id="pwa-banner">
  <div class="pwa-banner-row">
    <div class="pwa-banner-icon">📡</div>
    <div class="pwa-banner-text">
      <div class="pwa-banner-title">Install AV/CRM</div>
      <div class="pwa-banner-sub">Add to home screen — works offline</div>
    </div>
  </div>
  <div class="pwa-banner-btns">
    <button class="pwa-install-btn" id="pwa-install-btn">Install App</button>
    <button class="pwa-dismiss-btn" id="pwa-dismiss-btn">Not now</button>
  </div>
</div>

<script>
/* ============================================================
   PWA — Service Worker + Install Prompt
============================================================ */

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('[PWA] Service worker registered:', reg.scope);
  }).catch(function(err){
    console.log('[PWA] Service worker registration failed:', err);
  });
}

// Capture the install prompt (Android Chrome fires this)
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  _deferredPrompt = e;
  // Show our custom banner after a short delay
  setTimeout(function(){
    document.getElementById('pwa-banner').classList.add('show');
  }, 2000);
});

document.getElementById('pwa-install-btn').addEventListener('click', function(){
  document.getElementById('pwa-banner').classList.remove('show');
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(function(result){
      console.log('[PWA] Install choice:', result.outcome);
      _deferredPrompt = null;
    });
  }
});

document.getElementById('pwa-dismiss-btn').addEventListener('click', function(){
  document.getElementById('pwa-banner').classList.remove('show');
  // Don't show again this session
  _deferredPrompt = null;
});

// Hide banner if already installed
window.addEventListener('appinstalled', function(){
  document.getElementById('pwa-banner').classList.remove('show');
  console.log('[PWA] App installed');
});
</script>
